services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY: ${NO_PROXY-}
        PIP_INDEX_URL: ${PIP_INDEX_URL-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL-}
    container_name: reframeq-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/reframeq
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY: ${NO_PROXY-}
        PIP_INDEX_URL: ${PIP_INDEX_URL-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL-}
    container_name: reframeq-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/reframeq
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  seed:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY-}
        HTTPS_PROXY: ${HTTPS_PROXY-}
        NO_PROXY: ${NO_PROXY-}
        PIP_INDEX_URL: ${PIP_INDEX_URL-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL-}
    container_name: reframeq-seed
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/reframeq
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
    command: python -m app.scripts.seed
    restart: "no"

  db:
    image: postgres:16-alpine
    container_name: reframeq-db
    environment:
      POSTGRES_DB: reframeq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reframeq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reframeq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
